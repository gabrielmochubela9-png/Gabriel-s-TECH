<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel's TECH — Software &amp; Web Development</title>
<style>
  :root{
    --bg: #070c16;
    --panel: #0f1830;
    --panel-2: #121d3a;
    --line: rgba(120,170,255,0.18);
    --cyan: #35e0ff;
    --gold: #f2b705;
    --text: #eaf2ff;
    --muted: #93a4c9;
    --font-display: 'Space Grotesk', 'Segoe UI', sans-serif;
    --font-body: 'Inter', 'Segoe UI', sans-serif;
    --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    line-height:1.6;
    overflow-x:hidden;
  }
  a{color:inherit; text-decoration:none;}
  img{max-width:100%; display:block;}
  .wrap{max-width:1180px; margin:0 auto; padding:0 28px;}
  .tag{
    font-family:var(--font-mono);
    font-size:0.78rem;
    color:var(--cyan);
    letter-spacing:0.02em;
    opacity:0.9;
  }
  .tag::before{content:"<"; color:var(--gold);}
  .tag::after{content:"/>"; color:var(--gold);}
  h1,h2,h3{font-family:var(--font-display); font-weight:600; letter-spacing:-0.01em;}
  h2{font-size:clamp(1.8rem,3.4vw,2.6rem); margin-bottom:14px;}
  .lede{color:var(--muted); font-size:1.05rem; max-width:620px;}
  section{padding:96px 0;}
  .glass{
    background:linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border:1px solid var(--line);
    border-radius:16px;
    backdrop-filter: blur(6px);
  }
  .glow-btn{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font-mono); font-size:0.85rem;
    color:#04141c;
    background:linear-gradient(120deg, var(--cyan), #8ff5ff);
    padding:13px 24px; border-radius:10px;
    box-shadow:0 0 0 rgba(53,224,255,0.0);
    transition:box-shadow .35s ease, transform .2s ease;
    border:none; cursor:pointer;
  }
  .glow-btn:hover{ box-shadow:0 0 26px rgba(53,224,255,0.55); transform:translateY(-2px); }
  .ghost-btn{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font-mono); font-size:0.85rem;
    color:var(--text);
    background:transparent;
    border:1px solid var(--line);
    padding:12px 22px; border-radius:10px;
    transition:border-color .3s ease, background .3s ease;
  }
  .ghost-btn:hover{ border-color:var(--cyan); background:rgba(53,224,255,0.06); }

  /* NAV */
  header{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(7,12,22,0.72);
    backdrop-filter: blur(14px);
    border-bottom:1px solid var(--line);
  }
  nav{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 28px; max-width:1180px; margin:0 auto;
  }
  .brand{
    font-family:var(--font-display); font-weight:700; font-size:1.15rem;
    display:flex; align-items:center; gap:10px;
  }
  .brand .dot{
    width:9px; height:9px; border-radius:50%;
    background:var(--gold); box-shadow:0 0 10px var(--gold);
  }
  .navlinks{display:flex; gap:26px; font-family:var(--font-mono); font-size:0.82rem;}
  .navlinks a{color:var(--muted); transition:color .25s;}
  .navlinks a:hover{color:var(--cyan);}
  .navcta{display:flex; align-items:center; gap:14px;}
  .burger{display:none; flex-direction:column; gap:5px; cursor:pointer; background:none; border:none;}
  .burger span{width:22px; height:2px; background:var(--text);}

  /* HERO */
  .hero{
    position:relative; min-height:100vh; display:flex; align-items:center;
    padding-top:110px;
    overflow:hidden;
